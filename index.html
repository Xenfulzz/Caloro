<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caloro - Calorie Calculator</title>

<link rel="icon" type="image/png" href="logo1.png">

<!-- AdSense (ONLY ONCE) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5681534416531571"
crossorigin="anonymous"></script>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: linear-gradient(to bottom, #eef2f7, #ffffff);
  margin: 0;
  padding: 40px 20px;
}

.wrapper {
  max-width: 560px;
  margin: auto;
}

.card {
  background: white;
  padding: 32px;
  border-radius: 22px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.08);
}

.header {
  text-align: center;
  margin-bottom: 30px;
}

.logo-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
}

.logo-row img {
  height: 34px;
}

.logo-row span {
  font-size: 28px;
  font-weight: 700;
  color: #4CAF50;
}

.header p {
  margin-top: 8px;
  color: #666;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.full {
  grid-column: 1 / -1;
}

input, select {
  padding: 14px;
  border-radius: 12px;
  border: 1px solid #e3e6ea;
  font-size: 15px;
  background: #fafbfc;
}

input:focus, select:focus {
  outline: none;
  border-color: #4CAF50;
  background: white;
}

.main-btn {
  width: 100%;
  margin-top: 22px;
  padding: 15px;
  background: #4CAF50;
  color: white;
  border: none;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
}

.main-btn:hover {
  background: #43a047;
}

.divider {
  margin: 25px 0;
  border: none;
  border-top: 1px solid #eee;
}

.results {
  display: none;
}

.result-card {
  background: #f9fbfd;
  padding: 18px;
  border-radius: 14px;
  margin-bottom: 12px;
  text-align: center;
  border: 1px solid #edf0f3;
  position: relative;
}

.result-card strong {
  font-size: 20px;
  display: block;
}

.sub {
  font-size: 13px;
  color: #666;
  margin: 4px 0 6px;
}

.recommended {
  background: #e8f5e9;
  border: 2px solid #4CAF50;
}

.badge {
  position: absolute;
  top: -10px;
  right: 10px;
  background: #4CAF50;
  color: white;
  font-size: 12px;
  padding: 4px 8px;
  border-radius: 6px;
}

/* Ads */
.ad-container {
  margin: 20px 0;
  padding: 10px;
  border-radius: 14px;
  background: #f9fbfd;
  border: 1px solid #edf0f3;
  text-align: center;
}

.mid-ad {
  background: transparent;
  border: none;
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
  color: #888;
}

@media (max-width: 600px) {
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="wrapper">
  <div class="card">

    <div class="header">
      <a href="/" class="logo-row">
        <img src="logo1.png">
        <span>Caloro</span>
      </a>
      <p>Simple, accurate calories for fat loss or maintenance</p>
    </div>

    <div class="grid">
      <input type="number" id="age" placeholder="Age">
      <input type="number" id="weight" placeholder="Weight (kg)">
      <input type="number" id="height" placeholder="Height (cm)" class="full">

      <select id="gender" class="full">
        <option value="">Gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
      </select>

      <select id="activity" class="full">
        <option value="">Activity Level</option>
        <option value="1.2">Low</option>
        <option value="1.375">Light</option>
        <option value="1.55">Moderate</option>
        <option value="1.725">High</option>
      </select>
    </div>

    <button class="main-btn" onclick="calculateCalories()">Calculate Calories</button>

    <hr class="divider">

    <div class="results" id="results">

      <div class="result-card">
        <strong id="maintain"></strong>
        <div class="sub">Maintain weight</div>
      </div>

      <div class="result-card">
        <strong id="mild"></strong>
        <div class="sub">Mild weight loss</div>
      </div>

      <!-- MID AD -->
      <div class="ad-container mid-ad">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-5681534416531571"
             data-ad-slot="3628949583"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
      </div>

      <div class="result-card recommended">
        <div class="badge">🔥 Popular</div>
        <strong id="loss"></strong>
        <div class="sub">Weight loss</div>
      </div>

      <div class="result-card">
        <strong id="extreme"></strong>
        <div class="sub">Extreme weight loss</div>
      </div>

      <!-- MAIN AD -->
      <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-5681534416531571"
             data-ad-slot="3628949583"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
      </div>

    </div>

  </div>

  <div class="footer">
    © 2026 Caloro
  </div>
</div>

<script>
function calculateCalories() {
  let age = document.getElementById("age").value;
  let weight = document.getElementById("weight").value;
  let height = document.getElementById("height").value;
  let gender = document.getElementById("gender").value;
  let activity = document.getElementById("activity").value;

  if (!age || !weight || !height || !gender || !activity) {
    alert("Please fill in all fields");
    return;
  }

  age = parseInt(age);
  weight = parseFloat(weight);
  height = parseFloat(height);
  activity = parseFloat(activity);

  let bmr = gender === "male"
    ? (10 * weight) + (6.25 * height) - (5 * age) + 5
    : (10 * weight) + (6.25 * height) - (5 * age) - 161;

  let maintenance = bmr * activity;

  document.getElementById("maintain").innerText = Math.round(maintenance) + " kcal";
  document.getElementById("mild").innerText = Math.round(maintenance - 250) + " kcal";
  document.getElementById("loss").innerText = Math.round(maintenance - 500) + " kcal";
  document.getElementById("extreme").innerText = Math.round(maintenance - 1000) + " kcal";

  document.getElementById("results").style.display = "block";

  // Load ads AFTER results visible
  try {
    (adsbygoogle = window.adsbygoogle || []).push({});
    (adsbygoogle = window.adsbygoogle || []).push({});
  } catch (e) {
    console.log("Ads not ready yet");
  }
}
</script>

</body>
</html>
